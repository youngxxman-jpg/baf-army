<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big Ass Fartcoin ($BAF) — THE GUST IS HERE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-green: #39ff14;
      --neon-yellow: #fff01f;
      --neon-orange: #ff6b00;
      --dark-bg: #080b08;
      --card-bg: #0f1a0f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark-bg);
      color: #e8ffe8;
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }

    .font-black-ops { font-family: 'Black Ops One', cursive; }

    /* ---- Scrolling ticker ---- */
    .ticker-wrap { overflow: hidden; background: var(--neon-green); padding: 8px 0; }
    .ticker {
      display: flex;
      width: max-content;
      animation: ticker-scroll 18s linear infinite;
    }
    .ticker span { white-space: nowrap; padding: 0 2rem; color: #080b08; font-weight: 900; font-size: 0.9rem; letter-spacing: 0.1em; }
    @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ---- Neon glow helpers ---- */
    .glow-green  { text-shadow: 0 0 20px #39ff14, 0 0 40px #39ff14, 0 0 80px #39ff14; }
    .glow-yellow { text-shadow: 0 0 20px #fff01f, 0 0 40px #fff01f, 0 0 80px #fff01f; }
    .glow-orange { text-shadow: 0 0 20px #ff6b00, 0 0 40px #ff6b00; }
    .box-glow-green { box-shadow: 0 0 18px #39ff1466, 0 0 40px #39ff1422; }

    /* ---- Hero particles (pure CSS) ---- */
    .hero-bg {
      background: radial-gradient(ellipse at 50% 0%, #0d2a0d 0%, #080b08 70%);
      position: relative;
    }

    /* ---- Logo pulse ---- */
    @keyframes logo-pulse {
      0%, 100% { filter: drop-shadow(0 0 18px #39ff1499) drop-shadow(0 0 40px #39ff1444); transform: scale(1); }
      50%       { filter: drop-shadow(0 0 34px #39ff14cc) drop-shadow(0 0 70px #39ff1466); transform: scale(1.04); }
    }
    .logo-pulse { animation: logo-pulse 3s ease-in-out infinite; }

    /* ---- CTA Buttons ---- */
    .btn-primary {
      background: linear-gradient(135deg, #39ff14, #1aad00);
      color: #080b08;
      font-weight: 900;
      letter-spacing: 0.06em;
      border-radius: 9999px;
      padding: 1rem 2.2rem;
      font-size: 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 24px #39ff1480;
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #fff01f, #e6a000);
      color: #080b08;
      font-weight: 900;
      letter-spacing: 0.06em;
      border-radius: 9999px;
      padding: 1rem 2.2rem;
      font-size: 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 24px #fff01f80;
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
    }

    /* ---- Fart Button Styling ---- */
    .fart-button {
      background: radial-gradient(circle, #ff6b00, #994000);
      color: white;
      font-family: 'Black Ops One', cursive;
      font-size: 2rem;
      padding: 2rem 4rem;
      border-radius: 1rem;
      border: 4px solid #fff01f;
      box-shadow: 0 0 30px #ff6b00;
      cursor: pointer;
      transition: all 0.1s active;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 20px #ff6b00; } 50% { box-shadow: 0 0 50px #ff6b00, 0 0 20px #fff01f; } 100% { box-shadow: 0 0 20px #ff6b00; }
    }

    /* ---- Shake Animation ---- */
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .shake { animation: shake 0.5s; animation-iteration-count: 1; }

    .section-card { background: var(--card-bg); border: 1px solid #39ff1422; border-radius: 1.5rem; }
    .neon-divider { height: 2px; background: linear-gradient(90deg, transparent, #39ff14, transparent); }
  </style>
</head>
<body>

<!-- ======== TICKER ======== -->
<div class="ticker-wrap">
  <div class="ticker">
    <span>💨 $BAF 💨</span><span>BIG ASS FARTCOIN</span><span>LAUNCHING IN <span id="timer-top"></span></span>
    <span>1B SUPPLY</span><span>1% BURN</span><span>1% REFLECTION</span>
    <span>🚀 TO THE MOON</span><span>$BAF ARMY RISING</span><span>WIND OF CHANGE</span>
  </div>
</div>

<!-- ======== NAV ======== -->
<nav class="sticky top-0 z-50 bg-[#080b08cc] backdrop-blur border-b border-[#39ff1422]">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="https://static.prod-images.emergentagent.com/jobs/9703f498-eb10-4d19-9053-0f140baa1855/images/df1dcaa7837232118610996638217d7551ced33bff15b396e8f40a82350a20dc.png" alt="$BAF Logo" class="w-9 h-9 rounded-full object-cover" />
      <span class="font-black-ops text-[var(--neon-green)] text-lg tracking-widest glow-green">$BAF</span>
    </div>
    <a href="#cta" class="btn-primary text-sm py-2 px-5">Buy $BAF</a>
  </div>
</nav>

<!-- ======== HERO ======== -->
<section class="hero-bg min-h-screen flex flex-col items-center justify-center text-center px-4 py-24 relative overflow-hidden">
  <div class="mb-8 logo-pulse">
    <img src="https://static.prod-images.emergentagent.com/jobs/9703f498-eb10-4d19-9053-0f140baa1855/images/df1dcaa7837232118610996638217d7551ced33bff15b396e8f40a82350a20dc.png" alt="Logo" class="w-36 h-36 sm:w-48 sm:h-48 rounded-full object-cover mx-auto border-4 border-[#39ff1444]" />
  </div>
  <h1 class="font-black-ops text-5xl sm:text-7xl md:text-8xl leading-none mb-4 glow-green text-[var(--neon-green)]">
    THE GUST IS HERE.<br/><span class="text-[var(--neon-yellow)] glow-yellow">THE GAINS ARE REAL.</span>
  </h1>
  <div id="cta" class="mt-10 flex flex-wrap justify-center gap-4">
    <a href="https://t.me/BAFArmyOfficial" target="_blank" class="btn-primary">Join Telegram</a>
  </div>
</section>

<!-- ======== FART BUTTON SECTION ======== -->
<section id="the-button" class="py-24 px-4 text-center bg-[#050705]">
  <div class="max-w-4xl mx-auto">
    <h2 class="font-black-ops text-4xl sm:text-5xl glow-orange text-[var(--neon-orange)] mb-8 uppercase">RELEASE THE GUST</h2>
    
    <div class="relative inline-block">
      <button onclick="releaseTheGust()" class="fart-button">💨 PUSH FOR GUST 💨</button>
      <div id="gas-cloud" class="absolute inset-0 pointer-events-none opacity-0 flex items-center justify-center text-8xl transition-all duration-500">💨</div>
    </div>

    <!-- HIGH AVAILABILITY SOURCES -->
    <audio id="fart-sound-1" src="https://archive.org/download/fart-with-reverb/fart-with-reverb.mp3" preload="auto"></audio>
    <audio id="fart-sound-2" src="https://archive.org/download/rude_and_shocking_sound_effects/Farting%20-%20Short.mp3" preload="auto"></audio>
  </div>
</section>

<script>
  const targetDate = new Date("2026-05-02T08:30:00Z").getTime();
  setInterval(function() {
    const now = new Date().getTime();
    const distance = targetDate - now;
    const timeStr = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)) + "h " + Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)) + "m " + Math.floor((distance % (1000 * 60)) / 1000) + "s ";
    document.getElementById("timer-top").innerHTML = timeStr;
  }, 1000);

  function releaseTheGust() {
    const sound1 = document.getElementById("fart-sound-1");
    const sound2 = document.getElementById("fart-sound-2");
    const cloud = document.getElementById("gas-cloud");

    document.body.classList.add("shake");
    cloud.style.opacity = "1";
    cloud.style.transform = "scale(1.5) translateY(-50px)";

    // Try sound 1, then fallback to sound 2
    sound1.currentTime = 0;
    sound1.play().catch(() => {
        console.log("Sound 1 failed, trying fallback");
        sound2.currentTime = 0;
        sound2.play();
    });
    
    setTimeout(() => {
      document.body.classList.remove("shake");
      cloud.style.opacity = "0";
      cloud.style.transform = "scale(1) translateY(0)";
    }, 500);
  }
</script>
</body>
</html>
